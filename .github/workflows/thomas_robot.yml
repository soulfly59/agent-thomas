name: Surveillance Immoweb - Agent Thomas

on:
  schedule:
    - cron: '*/15 * * * *' # S'exécute toutes les 15 minutes
  workflow_dispatch: # Permet de le lancer manuellement si besoin

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: |
          pip install requests beautifulsoup4 playwright
          python -m playwright install chromium

      - name: Lancer l'Agent Thomas
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python .github/workflows/agent_ia.py

      - name: Sauvegarder l'historique
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add derniers_biens_immo.txt || echo "Pas de fichier mémoire encore créé"
          git commit -m "Mise à jour historique annonce" || echo "Pas de changement à sauvegarder"
          git push
